<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valhalla | Acceso Privado</title>
    
    <!-- Fonts & Master Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('fondo.jpg');
            background-size: cover;
            background-attachment: fixed;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--gold);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h2 {
            font-size: 28px;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .error-msg {
            color: #ff6b6b;
            text-align: center;
            font-size: 14px;
            margin-top: 20px;
            min-height: 20px;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="login-header">
            <h2 class="gold-gradient">VALHALLA</h2>
            <p style="font-size: 11px; letter-spacing: 2px; color: var(--gold);">CONTROL DE ACCESO</p>
        </div>

        <div class="form-group">
            <label><i class="fa-solid fa-user"></i> Usuario</label>
            <input type="text" id="username" placeholder="Tu identificación" required>
        </div>

        <div class="form-group" style="margin-top: 20px;">
            <label><i class="fa-solid fa-lock"></i> Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button class="btn-primary" style="width: 100%; margin-top: 40px;" onclick="handleLogin()">
            ENTRAR AL RITUAL
        </button>

        <div id="errorMsg" class="error-msg"></div>
        <div style="text-align: center; margin-top: 30px;">
             <a href="index.html" style="color: grey; font-size: 11px; text-decoration: none;">← Volver al sitio público</a>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if(!username || !password) {
                errorMsg.innerText = "Por favor, completa todos los campos.";
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem("user", JSON.stringify(data.user));
                    const role = data.user.role;
                    
                    if (role === "admin") window.location.href = "/admin.html";
                    else if (role === "employee") window.location.href = "/employee.html";
                    else window.location.href = "/index.html"; 
                } else {
                    errorMsg.innerText = data.message || "Credenciales incorrectas.";
                }
            } catch (err) {
                errorMsg.innerText = "Error de conexión con el servidor de Valhalla.";
            }
        }

        // Enter key to login
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
